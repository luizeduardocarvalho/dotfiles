# AeroSpace config. Real file lives in the repo; ~/.config/aerospace points here.
# Edit live, then reload with alt-shift-c (no rebuild needed).

start-at-login = true

default-root-container-layout = "tiles"
default-root-container-orientation = "auto"

after-login-command = []
after-startup-command = []

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# alt = option key (matches macos-option-as-alt in ghostty)
[mode.main.binding]
# --- Launch apps ---
alt-enter = "exec-and-forget open -a Ghostty"
alt-b = "exec-and-forget open -a 'Google Chrome'"
alt-s = "exec-and-forget open -a Spotify"

# --- Focus windows (vim keys) ---
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

# --- Move windows ---
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

# --- Layouts ---
alt-slash = "layout tiles horizontal vertical"     # toggle split orientation
alt-comma = "layout accordion horizontal vertical" # accordion (stacked)
alt-f = "fullscreen"
alt-shift-space = "layout floating tiling"          # toggle float

# --- Resize ---
alt-minus = "resize smart -50"
alt-equal = "resize smart +50"
alt-0 = "balance-sizes"                              # equalize all windows (50/50)

# --- Workspaces: switch (top-row keys, split-kb friendly) ---
# NOTE: alt-e / alt-i / alt-n / alt-u are macOS dead keys (accents: á â ã ü).
# Keep them unbound so accents still type. Workspaces E/I moved to D/G.
alt-q = "workspace Q"
alt-w = "workspace W"
alt-d = "workspace D"
alt-r = "workspace R"
alt-t = "workspace T"
alt-y = "workspace Y"
alt-g = "workspace G"
alt-o = "workspace O"
alt-p = "workspace P"

# --- Move window to workspace ---
alt-shift-q = "move-node-to-workspace Q"
alt-shift-w = "move-node-to-workspace W"
alt-shift-d = "move-node-to-workspace D"
alt-shift-r = "move-node-to-workspace R"
alt-shift-t = "move-node-to-workspace T"
alt-shift-y = "move-node-to-workspace Y"
alt-shift-g = "move-node-to-workspace G"
alt-shift-o = "move-node-to-workspace O"
alt-shift-p = "move-node-to-workspace P"

# --- Reload config ---
alt-shift-c = "reload-config"

# --- Window rules ---
# Spotify always floats (own window, not tiled with terminal)
[[on-window-detected]]
if.app-id = "com.spotify.client"
run = "layout floating"
